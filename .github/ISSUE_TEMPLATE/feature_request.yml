name: Feature Request
description: Suggest a new feature or enhancement for LineProof
title: '[feature] '
labels: enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting improvements to LineProof.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered alternative approaches?
