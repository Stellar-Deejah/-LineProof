# Dependencies
# Automatically generated by `cargo new` and customized for the LineProof project.

[package]
name = "lineproof-identity"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Identity binding module for LineProof: prevents transfer and duplicate enrollments."
homepage = "https://lineproof.dev"
repository = "https://github.com/lineproof/lineproof"
documentation = "https://docs.lineproof.dev"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
soroban-sdk = "22.0"
thiserror = "2"

[dev-dependencies]
soroban-sdk = { version = "22.0", features = ["testutils"] }
pretty_assertions = "1.4"

[profile.release]
opt-level = "z"
overflow-checks = true
debug = false
panic = "abort"
codegen-units = 1
lto = "fat"
